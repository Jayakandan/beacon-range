name: Build APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Locate the Gradle project
        id: proj
        run: |
          f=$(find . -name settings.gradle.kts -not -path '*/build/*' | head -n1)
          if [ -z "$f" ]; then echo "No settings.gradle.kts found!"; exit 1; fi
          dir=$(dirname "$f")
          echo "dir=$dir" >> "$GITHUB_OUTPUT"
          echo "Project found in: $dir"

      - name: Build debug APK (committed wrapper -> Gradle 8.5)
        working-directory: ${{ steps.proj.outputs.dir }}
        run: |
          chmod +x ./gradlew
          ./gradlew assembleDebug --stacktrace

      - name: Upload APK as artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: ${{ steps.proj.outputs.dir }}/app/build/outputs/apk/debug/app-debug.apk

      - name: Publish APK to Releases (tag "latest")
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: Latest debug build
          files: ${{ steps.proj.outputs.dir }}/app/build/outputs/apk/debug/app-debug.apk
